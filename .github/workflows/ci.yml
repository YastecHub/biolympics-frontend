name: frontend-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check + build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:run
      - name: Dependency audit (advisory)
        run: npm audit --audit-level=high || true

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t biolympics-frontend:${{ github.sha }} .
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: biolympics-frontend:${{ github.sha }}
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
